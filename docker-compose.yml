version: '3'
services:

  db:
    image: mongo:7.0.0
    container_name: db
    ports:
      - "27017:27017"
    restart: always

  postgres:
    image: postgres:16
    container_name: postgres
    ports: 
      - "5432:5432"
    environment: 
      - POSTGRES_DB=appdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    restart: always 

  rabbit:
    image: rabbitmq:3.12.4-management
    container_name: rabbit
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=test
      - RABBITMQ_DEFAULT_PASS=test
    restart: always

  # Service for loading database fixtures.
  db-fixture-rest-api:
    image: db-fixture-rest-api
    build: 
      context: ./db-fixture-rest-api
      dockerfile: Dockerfile
    container_name: db-fixture-rest-api
    ports:
     - "9000:80"
    environment:
     - PORT=80
     - DBHOST=mongodb://db:27017
     - FIXTURES_DIR=fixtures
    volumes:
     - ./fixtures:/usr/src/app/fixtures:z
    depends_on:
      - db
    restart: always

  gateway:
    image: gateway
    build: 
      context: ./gateway
      dockerfile: Dockerfile-dev
    container_name: gateway
    volumes:
      - /tmp/gateway/npm-cache:/root/.npm:z
      - ./gateway/src:/usr/src/app/src:z
      - ./gateway/public:/usr/src/app/public:z
    ports:
      - "4000:80"
    environment:
      - PORT=80
      - RABBIT=amqp://test:test@rabbit:5672
      - NODE_ENV=development
    depends_on:
      - rabbit
    restart: "no"

  video-streaming:
    image: video-streaming
    build: 
      context: ./video-streaming
      dockerfile: Dockerfile-dev
    container_name: video-streaming
    volumes:
      - /tmp/video-streaming/npm-cache:/root/.npm:z
      - ./video-streaming/src:/usr/src/app/src:z
    ports:
      - "4001:80"
    environment:
      - PORT=80
      - RABBIT=amqp://test:test@rabbit:5672
      - NODE_ENV=development
    depends_on:
      - db
      - rabbit
    restart: "no"

  video-upload:
    image: video-upload
    build: 
      context: ./video-upload
      dockerfile: Dockerfile-dev
    container_name: video-upload
    volumes:
      - /tmp/video-upload/npm-cache:/root/.npm:z
      - ./video-upload/src:/usr/src/app/src:z
      - ./video-upload/uploads:/usr/src/app/uploads:z
    ports:
     - "4004:80"
    environment:
      - PORT=80
      - RABBIT=amqp://test:test@rabbit:5672
      - NODE_ENV=development
    depends_on:
      - rabbit
    restart: "no"

  history:
    image: history
    build: 
      context: ./history
      dockerfile: Dockerfile-dev
    container_name: history
    volumes:
      - /tmp/history/npm-cache:/root/.npm:z
      - ./history/src:/usr/src/app/src:z
    ports:
     - "4002:80"
    environment:
      - PORT=80
      - RABBIT=amqp://test:test@rabbit:5672
      - DBHOST=mongodb://db:27017
      - DBNAME=history
      - NODE_ENV=development
    depends_on:
      - db
      - rabbit
    restart: "no"

  employees-crud:
    build: 
      context: ./employees-crud
      dockerfile: Dockerfile-dev
    container_name: employees-crud
    volumes: 
      - /tmp/employees-crud/npm-cache:/root/.npm:z
      - ./employees-crud/src:/usr/src/app/src:z
    ports:
      - "3000:80"
    environment: 
      - PORT=80
      - DATABASE_URL=postgres://postgres:postgres@employees-db:5432/lucky
      - DB_SCHEMA=public
      - DB_TABLE=employees  
      - NODE_ENV=development 
    depends_on:
      - employees-db 
    restart: "no"

  employees-db:
    image: postgres:16
    container_name: employees-db
    environment: 
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=lucky
    ports:
      - "5433:5432"

  # 
  # Uncomment this service to enable cloud storage.
  #
  # video-storage:
  #   image: azure-storage
  #   build: 
  #     context: ./azure-storage
  #     dockerfile: Dockerfile-dev
  #   container_name: video-storage
  #   volumes:
  #     - /tmp/azure-storage/npm-cache:/root/.npm:z
  #     - ./azure-storage/src:/usr/src/app/src:z
  #   ports:
  #    - "4005:80"
  #   environment:
  #     - PORT=80
  #     - STORAGE_ACCOUNT_NAME=${STORAGE_ACCOUNT_NAME}
  #     - STORAGE_ACCESS_KEY=${STORAGE_ACCESS_KEY}
  #   restart: "no"

  #
  # This is the local version of storage.
  # Instead of storing files in the cloud it stores files on the
  # local machine.
  #
  # This is "mock" for the storage microservices to make
  # local testing easier.
  #
  video-storage:
    image: mock-storage
    build: 
      context: ./mock-storage
      dockerfile: Dockerfile-dev
    container_name: video-storage
    volumes:
      - /tmp/mock-storage/npm-cache:/root/.npm:z
      - ./mock-storage/src:/usr/src/app/src:z
      - ./mock-storage/storage:/usr/src/app/storage:z
    ports:
     - "4005:80"
    environment:
      - PORT=80
    restart: "no"

  python-whisper:
    image: python-whisper 
    build: 
      context: ./python-whisper
      dockerfile: Dockerfile 
    container_name: python-whisper 
    volumes: 
      - ./python-whisper/src:/app
    ports: 
    - "8001:80"
    environment: 
    - PORT=80
    - VIDEO_STORAGE_SERVICE_URL=http://video-storage
    depends_on:
    - video-storage 
    restart: "no"

  metadata:
    image: metadata
    build: 
      context: ./metadata
      dockerfile: Dockerfile-dev
    container_name: metadata
    volumes:
      - /tmp/metadata/npm-cache:/root/.npm:z
      - ./metadata/src:/usr/src/app/src:z
    ports:
     - "4006:80"
    environment:
      - PORT=80
      - RABBIT=amqp://test:test@rabbit:5672
      - DBHOST=mongodb://db:27017
      - DBNAME=metadata
      - NODE_ENV=development
    depends_on:
      - db
      - rabbit
    restart: "no"

  gateway-react:
    image: gateway-react
    build:
      context: ./gateway-react/my-react-app
      dockerfile: Dockerfile-dev
    container_name: gateway-react
    volumes:
      - /tmp/gateway-react/npm-cache:/root/.npm:z
      - ./gateway-react/my-react-app:/usr/src/app:z
      - /usr/src/app/node_modules
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    depends_on:
      - backend-python
    restart: "no"

  backend-python:
    image: backend-python
    build:
      context: ./backend-python/python-shell
      dockerfile: Dockerfile-dev
    container_name: backend-python
    volumes:
      - ./backend-python/python-shell/index.py:/usr/src/app/index.py:z
    ports:
      - "8000:8000"
    env_file:
      - ./backend-python/python-shell/.env
    environment:
      - SHELL_AUTO_APPROVE=1
    restart: "no"